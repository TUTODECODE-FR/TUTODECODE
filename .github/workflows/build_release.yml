name: Build & Release Multi-Platform

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            artifact_path: build/app/outputs/flutter-apk/app-release.apk
            release_name: TUTODECODE-Android.apk
          - platform: windows
            os: windows-latest
            artifact_path: TUTODECODE-Windows.zip
            release_name: TUTODECODE-Windows.zip
          - platform: macos
            os: macos-latest
            artifact_path: TUTODECODE-macOS.zip
            release_name: TUTODECODE-macOS.zip
          - platform: linux
            os: ubuntu-latest
            artifact_path: TUTODECODE-Linux.tar.gz
            release_name: TUTODECODE-Linux.tar.gz
          - platform: ios
            os: macos-latest
            artifact_path: TUTODECODE-iOS.ipa
            release_name: TUTODECODE-iOS.ipa

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Android
        if: matrix.platform == 'android'
        run: |
          flutter build apk --release --verbose
          # Diagnostic: Lister tous les APK générés au cas où le chemin a changé
          find build/app/outputs -name "*.apk"
          # S'assurer que le fichier est bien là où on l'attend pour l'upload
          if [ ! -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "APK non trouvé au chemin standard, recherche alternative..."
            cp $(find build -name "*.apk" | head -n 1) build/app/outputs/flutter-apk/app-release.apk || true
          fi

      - name: Build Windows
        if: matrix.platform == 'windows'
        run: |
          flutter build windows --release
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath TUTODECODE-Windows.zip

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: |
          flutter build macos --release
          cd build/macos/Build/Products/Release && zip -r ../../../../../TUTODECODE-macOS.zip tutodecode.app

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y && sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          flutter build linux --release
          tar -czvf TUTODECODE-Linux.tar.gz -C build/linux/x64/release/bundle/ .

      - name: Build iOS
        if: matrix.platform == 'ios'
        run: |
          flutter build ios --release --no-codesign
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -qr TUTODECODE-iOS.ipa Payload


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: ${{ matrix.artifact_path }}

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Rename and Move Artifacts
        run: |
          mkdir release_assets
          # On renomme pour avoir des noms propres dans la release
          mv artifacts/app-release.apk release_assets/TUTODECODE-Android.apk || true
          mv artifacts/TUTODECODE-Windows.zip release_assets/TUTODECODE-Windows.zip || true
          mv artifacts/TUTODECODE-macOS.zip release_assets/TUTODECODE-macOS.zip || true
          mv artifacts/TUTODECODE-Linux.tar.gz release_assets/TUTODECODE-Linux.tar.gz || true
          mv artifacts/TUTODECODE-iOS.ipa release_assets/TUTODECODE-iOS.ipa || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          generate_release_notes: true
          draft: false
          prerelease: false


