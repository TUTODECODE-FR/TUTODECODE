name: Build & Release Multi-Platform

permissions:
  contents: write

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      target_tag:
        description: 'Tag de la release à mettre à jour (ex: v1.0.3)'
        required: false
        default: ''

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            artifact_path: build/app/outputs/flutter-apk/app-release.apk
            release_name: TUTODECODE-Android.apk
          - platform: windows
            os: windows-latest
            artifact_path: TUTODECODE-Windows.zip
            release_name: TUTODECODE-Windows.zip
          - platform: macos
            os: macos-latest
            artifact_path: TUTODECODE-macOS.zip
            release_name: TUTODECODE-macOS.zip
          - platform: linux
            os: ubuntu-latest
            artifact_path: TUTODECODE-Linux.tar.gz
            release_name: TUTODECODE-Linux.tar.gz
          - platform: ios
            os: macos-latest
            artifact_path: TUTODECODE-iOS.ipa
            release_name: TUTODECODE-iOS.ipa

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Android
        if: matrix.platform == 'android'
        run: |
          # Nettoyage préalable pour garantir un environnement propre
          flutter clean
          
          # Création du fichier local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          
          # On tente le build Flutter standard
          flutter build apk --release --verbose || echo "Flutter tool reported an error, trying to recover manually..."
          
          # Création du répertoire de destination pour l'upload
          mkdir -p build/app/outputs/flutter-apk
          
          # Recherche et copie de l'APK (Flutter Tool path standard)
          find build/app/outputs -name "*release.apk" -exec cp {} build/app/outputs/flutter-apk/app-release.apk \;
          
          # Si toujours pas d'APK, on tente un build Gradle direct (le mode le plus robuste)
          if [ ! -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "Aucun APK trouvé via Flutter. Tentative de build Gradle direct..."
            cd android
            chmod +x gradlew
            ./gradlew assembleRelease --no-daemon || echo "Gradle build failed too."
            cd ..
            # On cherche l'APK généré par Gradle
            find android/app/build/outputs/apk/release -name "*.apk" -exec cp {} build/app/outputs/flutter-apk/app-release.apk \;
          fi
          
          # Vérification finale
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "✅ APK de release capturé avec succès."
          else
            echo "❌ ERREUR: Impossible de générer ou de localiser l'APK."
            # Diagnostic: Lister tous les fichiers APK potentiels dans tout le projet
            find . -name "*.apk" || true
            exit 1
          fi

      - name: Build Windows
        if: matrix.platform == 'windows'
        run: |
          flutter build windows --release
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath TUTODECODE-Windows.zip

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: |
          flutter build macos --release
          cd build/macos/Build/Products/Release && zip -r ../../../../../TUTODECODE-macOS.zip tutodecode.app

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y && sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          flutter build linux --release
          tar -czvf TUTODECODE-Linux.tar.gz -C build/linux/x64/release/bundle/ .

      - name: Build iOS
        if: matrix.platform == 'ios'
        run: |
          flutter build ios --release --no-codesign
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -qr TUTODECODE-iOS.ipa Payload


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: ${{ matrix.artifact_path }}

  release:
    name: Create GitHub Release
    needs: build
    # On autorise la release sur tag OU si lancé manuellement via workflow_dispatch
    if: always() && (github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || startsWith(github.ref, 'refs/tags/v')) && (needs.build.result == 'success' || needs.build.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true
        continue-on-error: true

      - name: Rename and Move Artifacts
        run: |
          mkdir release_assets || true
          # On déplace les fichiers présents, les erreurs (|| true) évitent de stopper le script
          [ -f artifacts/app-release.apk ] && mv artifacts/app-release.apk release_assets/TUTODECODE-Android.apk || true
          [ -f artifacts/TUTODECODE-Windows.zip ] && mv artifacts/TUTODECODE-Windows.zip release_assets/TUTODECODE-Windows.zip || true
          [ -f artifacts/TUTODECODE-macOS.zip ] && mv artifacts/TUTODECODE-macOS.zip release_assets/TUTODECODE-macOS.zip || true
          [ -f artifacts/TUTODECODE-Linux.tar.gz ] && mv artifacts/TUTODECODE-Linux.tar.gz release_assets/TUTODECODE-Linux.tar.gz || true
          [ -f artifacts/TUTODECODE-iOS.ipa ] && mv artifacts/TUTODECODE-iOS.ipa release_assets/TUTODECODE-iOS.ipa || true

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          # On cible soit le tag manuel si fourni, soit le tag actuel
          tag_name: ${{ github.event.inputs.target_tag || github.ref_name }}
          files: release_assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: false



